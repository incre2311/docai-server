<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOC·AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0f0f0;font-family:system-ui,sans-serif;padding:20px;min-height:100vh}
h1{font-size:28px;color:#e8ff00;letter-spacing:2px;margin-bottom:4px}
.sub{font-size:11px;color:#444;letter-spacing:3px;margin-bottom:24px}
.box{background:#111;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:16px}
.box h2{font-size:13px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
textarea,input,select{width:100%;background:#181818;border:1px solid #333;border-radius:6px;color:#f0f0f0;padding:10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px}
textarea{resize:vertical;min-height:160px;line-height:1.6}
.btn{background:#e8ff00;color:#000;border:none;border-radius:6px;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.btn-purple{background:#7c3aed;color:white}
.status{font-size:11px;font-family:monospace;padding:8px 12px;border-radius:5px;background:#181818;border:1px solid #333;margin-bottom:10px;word-break:break-all}
.status.ok{border-color:#22c55e;color:#22c55e}
.status.error{border-color:#ef4444;color:#ef4444}
.status.loading{border-color:#f97316;color:#f97316}
.scene-card{background:#181818;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:8px}
.scene-num{font-size:10px;font-family:monospace;color:#e8ff00;margin-bottom:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:6px}
.tense{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.emotional{background:rgba(168,85,247,0.2);color:#a855f7;border:1px solid rgba(168,85,247,0.3)}
.neutral{background:rgba(136,136,136,0.2);color:#888;border:1px solid #333}
.timestamp{background:rgba(232,255,0,0.2);color:#e8ff00;border:1px solid rgba(232,255,0,0.3)}
.evidence{background:rgba(59,130,246,0.2);color:#3b82f6;border:1px solid rgba(59,130,246,0.3)}
.scene-text{font-size:12px;color:#888;font-style:italic;margin-bottom:6px}
.scene-dur{font-size:11px;font-family:monospace;color:#555}
.progress{height:4px;background:#222;border-radius:2px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:#e8ff00;border-radius:2px;width:0%;transition:width 0.3s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.footage-ok{font-size:11px;color:#3b82f6;font-family:monospace;margin-top:6px}
.footage-grok{font-size:11px;color:#f59e0b;margin-top:6px;line-height:1.5}
.render-box{background:rgba(34,197,94,0.1);border:1px solid #22c55e;border-radius:8px;padding:16px;text-align:center;margin-top:10px}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:10px;font-family:monospace;color:#555;margin-bottom:12px}
</style>
</head>
<body>
<h1>DOC·AI</h1>
<div class="sub">DOCUMENTARY PRODUCTION TOOL</div>

<div class="box">
  <h2>Server Status</h2>
  <div class="status" id="serverStatus">Checking...</div>
  <button class="btn" style="background:transparent;color:#888;border:1px solid #333;margin:0;padding:6px 12px;width:auto;" onclick="checkServer()">↻ Retry</button>
</div>

<div class="box">
  <h2>Phase 1 — Script</h2>
  <div class="legend">
    <span>.. = scene break</span>
    <span>— = 1s pause</span>
    <span>Date/Time = timestamp</span>
  </div>
  <textarea id="scriptInput" placeholder="Paste your script here. Separate scenes with .."></textarea>
  <div style="font-size:11px;color:#555;margin-bottom:10px" id="sceneCount">0 scenes detected</div>
  <div class="grid2">
    <input type="password" id="pexelsKey" placeholder="Pexels API Key">
    <input type="password" id="pixabayKey" placeholder="Pixabay API Key">
  </div>
  <button class="btn" onclick="analyzeAndFetch()">⚡ Analyze + Fetch Footage</button>
  <div class="progress"><div class="progress-fill" id="p1Fill"></div></div>
  <div class="status" id="p1Status" style="display:none"></div>
</div>

<div id="scenesOutput" style="display:none">
  <div class="box">
    <h2>Scenes</h2>
    <div id="scenesList"></div>
  </div>
</div>

<div id="renderSection" style="display:none">
  <div class="box">
    <h2>Phase 4 — Render</h2>
    <div style="background:#181818;border:1px solid #333;border-radius:6px;padding:12px;margin-bottom:12px;font-size:12px;color:#888;line-height:1.8" id="renderSummary"></div>
    <input type="text" id="docTitle" placeholder="Documentary Title">
    <button class="btn btn-purple" id="renderBtn" onclick="startRender()">🎬 Render Documentary</button>
    <div class="progress"><div class="progress-fill" id="renderFill"></div></div>
    <div class="status" id="renderStatus" style="display:none"></div>
    <div id="renderResult"></div>
  </div>
</div>

<script>
var SERVER = 'https://docai-server-production.up.railway.app';

var TENSE_KW = ['gun','bomb','war','fight','chase','arrest','raid','shoot','attack','cartel','hitman','kill','murder','crime','fbi','cia','police','swat','escape','military','weapon','terror'];
var EMOTIONAL_KW = ['suicide','funeral','grief','loss','cry','death','tears','tragedy','pain','alone','family','mother','father','love','goodbye','broken','mourn'];
var EVIDENCE_KW = ['according','reported','statistics','billion','million','percent','evidence','revealed','investigation','confirmed','classified','leaked'];
var DATE_KW = ['january','february','march','april','may','june','july','august','september','october','november','december','monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

var scenes = [];
var footageData = {};
var renderedBlob = null;

function checkServer() {
  var el = document.getElementById('serverStatus');
  el.textContent = 'Checking...';
  el.className = 'status loading';
  var url = SERVER + '/health';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(d){
      el.textContent = 'OK — ' + d.message;
      el.className = 'status ok';
    })
    .catch(function(e){
      el.textContent = 'Error: ' + e.message;
      el.className = 'status error';
    });
}

function calcDuration(text, type, pauseCount) {
  var words = text.trim().split(/\s+/).filter(function(w){ return w.length > 0; }).length;
  var dur = (words / 150) * 60;
  if (type === 'tense') dur *= 0.75;
  if (type === 'emotional') dur *= 1.25;
  if (type === 'timestamp') return 4;
  dur += pauseCount;
  return Math.max(3, Math.round(dur));
}

function detectType(text) {
  var lower = text.toLowerCase();
  var words = lower.split(/\s+/);
  var hasDate = DATE_KW.some(function(k){ return lower.includes(k); }) || /\d{4}/.test(text) || /\d{1,2}:\d{2}/.test(text);
  if (hasDate && text.length < 60) return 'timestamp';
  if (EVIDENCE_KW.some(function(k){ return lower.includes(k); })) return 'evidence';
  if (TENSE_KW.some(function(k){ return lower.includes(k); })) return 'tense';
  if (EMOTIONAL_KW.some(function(k){ return lower.includes(k); })) return 'emotional';
  return 'neutral';
}

function parseScript(raw) {
  var parts = raw.split('..').map(function(t){ return t.trim(); }).filter(function(t){ return t.length > 0; });
  return parts.map(function(text, i) {
    var clean = text.replace(/—/g, ' ').replace(/\n\s*\n/g, ' ').trim();
    var dashes = (text.match(/—/g) || []).length;
    var type = detectType(clean);
    var dur = calcDuration(clean, type, dashes);
    var queryWords = clean.split(' ').filter(function(w){ return w.length > 3; }).slice(0, 4).join(' ');
    return { index: i+1, cleanText: clean, type: type, dur: dur, query: queryWords };
  });
}

function updateCount() {
  var val = document.getElementById('scriptInput').value;
  var count = val.split('..').filter(function(s){ return s.trim().length > 0; }).length;
  document.getElementById('sceneCount').textContent = count + (count === 1 ? ' scene' : ' scenes') + ' detected';
}

document.getElementById('scriptInput').addEventListener('input', updateCount);

function fetchPexels(query, key, dur) {
  return fetch('https://api.pexels.com/videos/search?query=' + encodeURIComponent(query) + '&per_page=3&orientation=landscape', {
    headers: { 'Authorization': key }
  }).then(function(r){ return r.json(); }).then(function(d){
    if (!d.videos || !d.videos.length) return null;
    var v = d.videos[0];
    var f = v.video_files && (v.video_files.find(function(x){ return x.quality === 'hd'; }) || v.video_files[0]);
    return { url: f && f.link, source: 'pexels', query: query };
  }).catch(function(){ return null; });
}

function fetchPixabay(query, key) {
  return fetch('https://pixabay.com/api/videos/?key=' + key + '&q=' + encodeURIComponent(query) + '&per_page=3')
    .then(function(r){ return r.json(); }).then(function(d){
      if (!d.hits || !d.hits.length) return null;
      var v = d.hits[0];
      var f = v.videos && (v.videos.large || v.videos.medium || v.videos.small);
      return { url: f && f.url, source: 'pixabay', query: query };
    }).catch(function(){ return null; });
}

function grokPrompt(sc) {
  var styles = {
    tense: 'Dark cinematic, dramatic shadows, film grain, high tension. 16:9.',
    emotional: 'Soft melancholic lighting, muted warm tones, emotional. 16:9.',
    evidence: 'Documentary style, cool tones, high contrast. 16:9.',
    timestamp: 'Dark minimal, text overlay background. 16:9.',
    neutral: 'Cinematic documentary, natural lighting. 16:9.'
  };
  return sc.cleanText.substring(0, 80) + '. ' + (styles[sc.type] || styles.neutral);
}

function analyzeAndFetch() {
  var raw = document.getElementById('scriptInput').value.trim();
  if (!raw) { alert('Paste your script first'); return; }
  var pKey = document.getElementById('pexelsKey').value.trim();
  var pbKey = document.getElementById('pixabayKey').value.trim();
  var p1Fill = document.getElementById('p1Fill');
  var p1Status = document.getElementById('p1Status');

  p1Status.style.display = 'block';
  p1Status.className = 'status loading';
  p1Status.textContent = 'Parsing script...';

  scenes = parseScript(raw);
  footageData = {};

  if (!scenes.length) {
    p1Status.textContent = 'No scenes found. Separate scenes with ..';
    p1Status.className = 'status error';
    return;
  }

  var list = document.getElementById('scenesList');
  list.innerHTML = '';
  document.getElementById('scenesOutput').style.display = 'block';

  var i = 0;
  function processNext() {
    if (i >= scenes.length) {
      p1Fill.style.width = '100%';
      p1Status.textContent = 'Done! ' + scenes.length + ' scenes processed.';
      p1Status.className = 'status ok';
      buildRenderSummary();
      document.getElementById('renderSection').style.display = 'block';
      return;
    }
    var sc = scenes[i];
    p1Fill.style.width = ((i / scenes.length) * 100) + '%';
    p1Status.textContent = 'Scene ' + (i+1) + '/' + scenes.length + '...';

    var card = document.createElement('div');
    card.className = 'scene-card';
    card.id = 'sc-' + i;
    card.innerHTML = '<div class="scene-num">SCENE ' + String(i+1).padStart(2,'0') + '</div>' +
      '<span class="badge ' + sc.type + '">' + sc.type.toUpperCase() + '</span>' +
      '<div class="scene-text">"' + sc.cleanText.substring(0, 80) + (sc.cleanText.length > 80 ? '...' : '') + '"</div>' +
      '<div class="scene-dur">' + sc.dur + 's · ' + sc.cleanText.trim().split(/\s+/).length + ' words</div>' +
      '<div id="ft-' + i + '"><span style="color:#555;font-size:11px">Fetching footage...</span></div>';
    list.appendChild(card);

    var idx = i;
    var promise;
    if (sc.type === 'timestamp') {
      footageData[idx] = { source: 'text', url: null };
      document.getElementById('ft-' + idx).innerHTML = '<div class="footage-ok">🕐 Text overlay</div>';
      i++;
      setTimeout(processNext, 100);
      return;
    }

    if (pKey) {
      promise = fetchPexels(sc.query, pKey, sc.dur);
    } else {
      promise = Promise.resolve(null);
    }

    promise.then(function(result) {
      if (result) {
        footageData[idx] = result;
        document.getElementById('ft-' + idx).innerHTML = '<div class="footage-ok">🟣 Pexels: "' + result.query + '"</div>';
      } else if (pbKey) {
        return fetchPixabay(sc.query, pbKey).then(function(r2) {
          if (r2) {
            footageData[idx] = r2;
            document.getElementById('ft-' + idx).innerHTML = '<div class="footage-ok">🔵 Pixabay: "' + r2.query + '"</div>';
          } else {
            footageData[idx] = { source: 'grok', url: null, prompt: grokPrompt(sc) };
            document.getElementById('ft-' + idx).innerHTML = '<div class="footage-grok">🟡 Grok: ' + grokPrompt(sc).substring(0, 60) + '...</div>';
          }
        });
      } else {
        footageData[idx] = { source: 'grok', url: null, prompt: grokPrompt(sc) };
        document.getElementById('ft-' + idx).innerHTML = '<div class="footage-grok">🟡 Grok: ' + grokPrompt(sc).substring(0, 60) + '...</div>';
      }
    }).then(function() {
      i++;
      setTimeout(processNext, 300);
    });
  }

  processNext();
}

function buildRenderSummary() {
  var total = scenes.reduce(function(a, s){ return a + s.dur; }, 0);
  var pexels = Object.values(footageData).filter(function(r){ return r.source === 'pexels'; }).length;
  var pixabay = Object.values(footageData).filter(function(r){ return r.source === 'pixabay'; }).length;
  var grok = Object.values(footageData).filter(function(r){ return r.source === 'grok'; }).length;
  var ts = Object.values(footageData).filter(function(r){ return r.source === 'text'; }).length;
  document.getElementById('renderSummary').innerHTML =
    '📽 Scenes: <strong>' + scenes.length + '</strong> &nbsp; ⏱ Duration: <strong style="color:#e8ff00">' + Math.floor(total/60) + 'm ' + (total%60) + 's</strong><br>' +
    '🟣 Pexels: <strong>' + pexels + '</strong> &nbsp; 🔵 Pixabay: <strong>' + pixabay + '</strong> &nbsp; 🟡 Grok: <strong>' + grok + '</strong> &nbsp; 🕐 Timestamps: <strong>' + ts + '</strong>';
}

function startRender() {
  var title = document.getElementById('docTitle').value.trim() || 'Documentary';
  var renderBtn = document.getElementById('renderBtn');
  var renderFill = document.getElementById('renderFill');
  var renderStatus = document.getElementById('renderStatus');
  var renderResult = document.getElementById('renderResult');

  renderBtn.disabled = true;
  renderStatus.style.display = 'block';
  renderStatus.className = 'status loading';
  renderStatus.textContent = 'Sending to server...';
  renderResult.innerHTML = '';
  renderFill.style.width = '10%';

  var payload = {
    jobId: 'job_' + Date.now(),
    title: title,
    scenes: scenes.map(function(sc, i) {
      var ft = footageData[i] || {};
      return {
        order: sc.index,
        type: sc.type,
        duration: sc.dur,
        footageUrl: ft.url || null,
        timestampText: sc.cleanText,
        narrationText: sc.cleanText
      };
    })
  };

  var prog = 10;
  var interval = setInterval(function() {
    prog = Math.min(prog + 1.5, 88);
    renderFill.style.width = prog + '%';
    renderStatus.textContent = 'Rendering... ' + Math.round(prog) + '%';
  }, 1500);

  fetch(SERVER + '/render', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(res) {
    clearInterval(interval);
    if (!res.ok) {
      return res.json().then(function(e) { throw new Error(e.error || 'Server error ' + res.status); });
    }
    renderFill.style.width = '100%';
    renderStatus.textContent = 'Done! Downloading...';
    renderStatus.className = 'status ok';
    return res.blob();
  }).then(function(blob) {
    renderedBlob = blob;
    var mb = (blob.size / 1024 / 1024).toFixed(1);
    renderResult.innerHTML = '<div class="render-box"><div style="font-size:20px;color:#22c55e;font-weight:700;margin-bottom:8px">✓ DOCUMENTARY READY</div><div style="font-size:12px;color:#888;margin-bottom:12px">' + scenes.length + ' scenes · ' + mb + ' MB</div><button class="btn" onclick="downloadVideo()">⬇ Download .mp4</button></div>';
    renderBtn.disabled = false;
  }).catch(function(e) {
    clearInterval(interval);
    renderStatus.textContent = 'Error: ' + e.message;
    renderStatus.className = 'status error';
    renderBtn.disabled = false;
  });
}

function downloadVideo() {
  if (!renderedBlob) return;
  var url = URL.createObjectURL(renderedBlob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'documentary_' + Date.now() + '.mp4';
  a.click();
  URL.revokeObjectURL(url);
}

checkServer();
</script>
</body>
</html>
